<svg width="200" height="200" viewBox="0 0 200 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Aphelion Favicon</title>
<desc>Aphelion browser tab icon — orbital dot mark</desc>

<rect width="200" height="200" rx="40" fill="#0c1119"/>

<!-- Orbit rings -->
<circle cx="100" cy="100" r="72" fill="none" stroke="#1a2d42" stroke-width="1.2" stroke-dasharray="3 5"/>
<circle cx="100" cy="100" r="48" fill="none" stroke="#1a2d42" stroke-width="1" stroke-dasharray="3 5"/>
<circle cx="100" cy="100" r="26" fill="none" stroke="#1a2d42" stroke-width="1" stroke-dasharray="3 5"/>

<!-- Connection lines from center -->
<line x1="100" y1="100" x2="138" y2="62" stroke="#e03838" stroke-width="1" opacity="0.6"/>
<line x1="100" y1="100" x2="60" y2="128" stroke="#e03838" stroke-width="1" opacity="0.6"/>
<line x1="100" y1="100" x2="148" y2="148" stroke="#00e87a" stroke-width="1" opacity="0.7"/>

<!-- Equity center -->
<circle cx="100" cy="100" r="16" fill="none" stroke="#00e87a" stroke-width="1.5" opacity="0.7"/>
<circle cx="100" cy="100" r="9" fill="#042c10"/>
<circle cx="100" cy="100" r="4.5" fill="#00e87a"/>

<!-- Red node top-right (outer orbit) -->
<circle cx="138" cy="62" r="10" fill="none" stroke="#e03838" stroke-width="0.8" opacity="0.35"/>
<circle cx="138" cy="62" r="6" fill="#5a1010"/>
<circle cx="138" cy="62" r="3.5" fill="#e03838"/>

<!-- Red node left (mid orbit) -->
<circle cx="60" cy="128" r="8" fill="none" stroke="#e03838" stroke-width="0.8" opacity="0.35"/>
<circle cx="60" cy="128" r="5" fill="#4a0e0e"/>
<circle cx="60" cy="128" r="3" fill="#e03838"/>

<!-- Green node bottom-right (outer orbit) -->
<circle cx="148" cy="148" r="12" fill="none" stroke="#00e87a" stroke-width="0.8" opacity="0.45"/>
<circle cx="148" cy="148" r="7" fill="#042c10"/>
<circle cx="148" cy="148" r="4" fill="#00e87a"/>

</svg>
